name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Restore locked dependencies
        run: dotnet restore MedicalAppointments.slnx --locked-mode
      - name: Verify formatting
        run: dotnet format MedicalAppointments.slnx --verify-no-changes --no-restore
      - name: Build
        run: dotnet build MedicalAppointments.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test MedicalAppointments.slnx --configuration Release --no-build --no-restore
